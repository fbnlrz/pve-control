name: Update Version & Publish Homey App

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version bump
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      changelog:
        description: Changelog (English, shown in the App Store)
        type: string
        required: true

permissions:
  contents: write

jobs:
  publish:
    name: Update version & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate (publish level)
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: publish

      - name: Update version
        uses: athombv/github-action-homey-app-update-version@master
        id: update-version
        with:
          version: ${{ inputs.version }}
          changelog: ${{ inputs.changelog }}

      - name: Commit & push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bump Homey app version to v${{ steps.update-version.outputs.version }} [skip ci]"
          git push

      - name: Publish
        uses: athombv/github-action-homey-app-publish@master
        id: publish
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}

      - name: Summary
        run: echo "Published Prox-Control v${{ steps.update-version.outputs.version }} — manage at ${{ steps.publish.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
