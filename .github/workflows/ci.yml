name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx tsc -p tsconfig.test.json && node --import tsx --test test/*.test.ts
      - name: Build manifest
        run: node scripts/build-app-json.mjs
      - name: Validate app (publish level)
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: publish
